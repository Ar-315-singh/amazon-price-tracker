name: Amazon Discount Tracker

on:
  schedule:
    - cron: '0 */3 * * *' # Har 3 ghante mein chalega
  workflow_dispatch: # Manual chalane ke liye

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Chrome Browser
        uses: browser-actions/setup-chrome@v1 # Fixed v1 version

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Script
        run: python app.py # Aapki main file ka naam app.py hai
